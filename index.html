<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jake Walkden // Portfolio</title>
  <style>
    :root {
      --bg:           #050a0f;
      --bg-slot:      #0a1520;
      --green:         #0fac3e;
      --green-glow:    rgba(9, 255, 0, 0.2);
      --accent:       #00eeff;
      --text:         #c0e0c1;
      --text-dim:     #4a7a6a;
      --border:       rgba(15, 172, 62, 0.2);
      --border-hot:   rgba(15, 172, 62, 0.7);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #appWrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: clamp(32px, 5vh, 72px) clamp(20px, 4vw, 64px) 80px;
    }

    /* ── Detail Overlay ── */
    #pageDetail {
      position: fixed;
      inset: 0;
      background: var(--bg);
      overflow: hidden;
      transform: translateX(100%);
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
      z-index: 100;
      display: flex;
      justify-content: center;
    }

    #pageDetail.open {
      transform: translateX(0);
    }

    .detail-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      overflow-y: auto;
      height: 100%;
      padding: clamp(32px, 5vh, 72px) clamp(20px, 4vw, 64px) 80px;
      scrollbar-width: thin;
      scrollbar-color: rgba(15, 172, 62, 0.3) transparent;
    }

    .detail-inner::-webkit-scrollbar        { width: 4px; }
    .detail-inner::-webkit-scrollbar-track  { background: transparent; }
    .detail-inner::-webkit-scrollbar-thumb  { background: rgba(15, 172, 62, 0.3); border-radius: 2px; }
    .detail-inner::-webkit-scrollbar-thumb:hover { background: rgba(15, 172, 62, 0.6); }

    /* Global scrollbar for main page */
    html {
      scrollbar-gutter: stable;
      scrollbar-width: thin;
      scrollbar-color: rgba(15, 172, 62, 0.3) transparent;
    }

    html::-webkit-scrollbar        { width: 4px; }
    html::-webkit-scrollbar-track  { background: transparent; }
    html::-webkit-scrollbar-thumb  { background: rgba(15, 172, 62, 0.3); border-radius: 2px; }
    html::-webkit-scrollbar-thumb:hover { background: rgba(15, 172, 62, 0.6); }

    /* ── Project Nav Arrows ── */
    .project-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(5, 10, 15, 0.85);
      border: 1px solid var(--border);
      color: var(--green);
      font-family: inherit;
      cursor: pointer;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 18px 10px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .project-nav:hover {
      border-color: var(--green);
      box-shadow: 0 0 14px rgba(15, 172, 62, 0.2);
    }

    .project-nav.prev { left: -48px; }
    .project-nav.next { right: -48px; }

    .nav-arrow { font-size: 14px; }

    .nav-label {
      font-size: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      writing-mode: vertical-rl;
      max-height: 100px;
      overflow: hidden;
      white-space: nowrap;
    }

    .project-nav.prev .nav-label { transform: rotate(180deg); }

    /* ── Project Slide Transitions ── */
    @keyframes slideOutLeft {
      from { transform: translateX(0);     opacity: 1; }
      to   { transform: translateX(-5vw);  opacity: 0; }
    }
    @keyframes slideOutRight {
      from { transform: translateX(0);     opacity: 1; }
      to   { transform: translateX(5vw);   opacity: 0; }
    }
    @keyframes slideInFromRight {
      from { transform: translateX(5vw);   opacity: 0; }
      to   { transform: translateX(0);     opacity: 1; }
    }
    @keyframes slideInFromLeft {
      from { transform: translateX(-5vw);  opacity: 0; }
      to   { transform: translateX(0);     opacity: 1; }
    }

    .detail-inner.exit-left  { animation: slideOutLeft     0.2s ease forwards; }
    .detail-inner.exit-right { animation: slideOutRight    0.2s ease forwards; }
    .detail-inner.enter-right { animation: slideInFromRight 0.25s ease forwards; }
    .detail-inner.enter-left  { animation: slideInFromLeft  0.25s ease forwards; }

    /* ── Detail Page Header ── */
    .detail-page-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      width: 100%;
      max-width: 1400px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: clamp(32px, 4vh, 56px);
    }

    .detail-page-header .sys-label {
      text-align: center;
      margin-bottom: 0;
    }

    .header-nav-btns {
      display: none;
      gap: 6px;
    }

    .header-nav-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--green);
      font-size: 13px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .header-nav-btn:hover {
      border-color: var(--green);
      box-shadow: 0 0 8px rgba(15, 172, 62, 0.25);
    }

    .header-nav-btn:disabled {
      opacity: 0.2;
      pointer-events: none;
    }

    .back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--green);
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 7px 16px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .back-btn:hover {
      border-color: var(--green);
      box-shadow: 0 0 10px rgba(15, 172, 62, 0.2);
    }

    /* ── Hero Layout ── */
    .hero-layout {
      position: relative;
      overflow: visible;
      width: 100%;
      max-width: 1400px;
      display: grid;
      grid-template-columns: 5fr 3fr;
      grid-template-rows: auto auto;
      gap: 16px;
      align-items: start;
      margin-bottom: 40px;
    }

    @media (max-width: 900px) {
      /* Switch hero layout to flex so caption reliably stacks below */
      .hero-layout {
        display: flex;
        flex-direction: column;
      }
    }

    @media (max-width: 768px) {
      .detail-inner {
        padding: 24px 20px 60px;
      }

      .detail-page-header {
        margin-bottom: 20px;
        padding-bottom: 16px;
      }

      .detail-page-header .sys-label { display: none; }

      .header-nav-btns { display: flex; }

      .project-nav { display: none; }
    }

    /* ── Hero ── */
    .detail-hero {
      grid-column: 1;
      grid-row: 1;
      background: #02081000;
    }

    .hero-placeholder {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px dashed rgba(15, 172, 62, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    .hero-placeholder::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 3px,
        rgba(0, 0, 0, 0.18) 3px,
        rgba(0, 0, 0, 0.18) 4px
      );
      pointer-events: none;
    }

    .hero-media {
      width: 100%;
      height: auto;
      max-height: 50vh;
      display: block;
      object-fit: contain;
      cursor: pointer;
    }

    .hero-video-wrap {
      position: relative;
      display: block;
      line-height: 0;
    }

    video.hero-media {
      transition: filter 0.3s ease;
    }

    .hero-video-wrap:hover video.hero-media {
      filter: drop-shadow(0 0 22px rgba(15, 172, 62, 0.5));
    }

    img.hero-media {
      transition: filter 0.3s ease;
    }

    img.hero-media:hover {
      filter: drop-shadow(0 0 22px rgba(15, 172, 62, 0.5));
    }

    .hero-play-btn {
      position: absolute;
      bottom: 12px;
      left: 12px;
      width: 40px;
      height: 40px;
      background: rgba(5, 10, 15, 0.85);
      border: 1px solid var(--border);
      color: var(--green);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .hero-play-btn:hover {
      border-color: var(--green);
      box-shadow: 0 0 10px rgba(15, 172, 62, 0.3);
    }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(5, 10, 15, 0.96);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    #lightbox.open {
      opacity: 1;
      pointer-events: auto;
    }

    #lightboxClose {
      position: absolute;
      top: 20px;
      right: 24px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 14px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s;
    }

    #lightboxClose:hover {
      border-color: var(--green);
      color: var(--green);
    }

    #lightboxContent {
      max-width: 92vw;
      max-height: 92vh;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
      transform: scale(0.92);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #lightbox.open #lightboxContent {
      transform: scale(1);
    }

    #lightboxContent img,
    #lightboxContent video {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      display: block;
    }


    /* ── Caption Panel ── */
    .hero-caption {
      grid-column: 2;
      grid-row: 1 / 3;
      border: 1px solid var(--border);
      background: var(--bg-slot);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }

    .hero-caption::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
    }

    .caption-index {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .caption-title {
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--green);
      text-transform: uppercase;
    }

    .caption-body {
      font-size: clamp(13px, 1vw, 15px);
      line-height: 1.9;
      color: var(--text);
      letter-spacing: 0.4px;
    }

    .caption-empty {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed rgba(15, 172, 62, 0.12);
    }

    /* ── Thumbnail Strip ── */
    .detail-thumbs {
      grid-column: 1;
      grid-row: 2;
      width: 100%;
      min-width: 0;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(15, 172, 62, 0.25) transparent;
    }

    .detail-thumbs::-webkit-scrollbar        { height: 3px; }
    .detail-thumbs::-webkit-scrollbar-track  { background: transparent; }
    .detail-thumbs::-webkit-scrollbar-thumb  { background: rgba(15, 172, 62, 0.25); }

    .thumbs-strip {
      display: flex;
      gap: 10px;
    }

    .thumb {
      width: 110px;
      aspect-ratio: 1;
      flex-shrink: 0;
      background: #020810;
      border: 1px dashed rgba(15, 172, 62, 0.2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 3px,
        rgba(0, 0, 0, 0.18) 3px,
        rgba(0, 0, 0, 0.18) 4px
      );
      pointer-events: none;
    }

    .thumb:hover       { border-color: rgba(15, 172, 62, 0.5); }
    .thumb.active      { border: 1px solid var(--green); box-shadow: 0 0 10px rgba(15, 172, 62, 0.25); }

    .thumb-num {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text-dim);
    }

    .thumb img,
    .thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Detail Info ── */
    .detail-info-grid {
      width: 100%;
      max-width: 1400px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(24px, 3vw, 64px);
    }

    @media (max-width: 640px) {
      .detail-info-grid { grid-template-columns: 1fr; }
    }

    .detail-project-title {
      font-size: clamp(22px, 2.8vw, 44px);
      font-weight: normal;
      color: var(--green);
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(15, 172, 62, 0.4);
      margin-bottom: 16px;
    }

    /* ── Detail Footer ── */
    .detail-footer {
      width: 100%;
      max-width: 1400px;
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 150;
      background: var(--bg);
      width: 100%;
      max-width: 1400px;
      margin-bottom: clamp(32px, 4vh, 56px);
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .sys-label {
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 20px;
    }

    h1 {
      font-size: clamp(24px, 3vw, 48px);
      font-weight: normal;
      color: var(--green);
      letter-spacing: 5px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(15, 172, 62, 0.6), 0 0 50px rgba(15, 172, 62, 0.2);
    }

    .cursor {
      display: inline-block;
      width: clamp(10px, 1.2vw, 18px);
      height: 1.1em;
      background: var(--green);
      vertical-align: bottom;
      margin-left: 6px;
      animation: blink 1.2s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .header-sub {
      font-size: clamp(12px, 1vw, 14px);
      letter-spacing: 3px;
      color: var(--text-dim);
      margin-top: 8px;
      text-transform: uppercase;
    }

    .mem-bar-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .mem-bar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bar-track {
      width: clamp(120px, 12vw, 200px);
      height: 6px;
      background: rgba(15, 172, 62, 0.08);
      border: 1px solid var(--border);
    }

    .bar-fill {
      width: 67%;
      height: 100%;
      background: var(--green);
      box-shadow: 0 0 6px rgba(15, 172, 62, 0.9);
    }

    /* ── Grid ── */
    .grid-label {
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 18px;
      width: 100%;
      max-width: 1400px;
    }

    main {
      width: 100%;
      max-width: 1400px;
    }

    .slot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    @media (max-width: 520px) {
      .slot-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    }

    /* ── Save Slot ── */
    .slot {
      border: 1px solid var(--border);
      background: var(--bg-slot);
      cursor: pointer;
      position: relative;
      outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }

    .slot:hover,
    .slot:focus-visible,
    .slot.active {
      border-color: var(--border-hot);
      background: rgba(15, 172, 62, 0.04);
      box-shadow: 0 0 18px rgba(15, 172, 62, 0.18), inset 0 0 18px rgba(15, 172, 62, 0.04);
    }

    .slot.active {
      border-color: var(--green);
      animation: slot-pulse 2.5s ease-in-out infinite;
    }

    @keyframes slot-pulse {
      0%, 100% { box-shadow: 0 0 18px rgba(15, 172, 62, 0.18), inset 0 0 18px rgba(15, 172, 62, 0.04); }
      50%       { box-shadow: 0 0 30px rgba(15, 172, 62, 0.32), inset 0 0 28px rgba(15, 172, 62, 0.08); }
    }

    .slot-icon {
      width: 100%;
      aspect-ratio: 1;
      background: #020810;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .slot-icon::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 3px,
        rgba(0, 0, 0, 0.22) 3px,
        rgba(0, 0, 0, 0.22) 4px
      );
      pointer-events: none;
    }

    .slot-icon video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: drop-shadow(0 0 6px rgba(0, 171, 12, 0.35));
      transition: filter 0.2s;
    }

    .slot:hover .slot-icon video,
    .slot:focus-visible .slot-icon video,
    .slot.active .slot-icon video {
      filter: drop-shadow(0 0 14px rgba(96, 209, 104, 0.75));
    }

    .slot-icon svg {
      width: 42%;
      height: 42%;
      opacity: 0.22;
      transition: opacity 0.2s;
    }

    .slot:hover .slot-icon svg,
    .slot:focus-visible .slot-icon svg,
    .slot.active .slot-icon svg {
      opacity: 0.55;
    }

    .slot-info {
      padding: 10px 14px 12px;
      border-top: 1px solid var(--border);
    }

    .slot-name {
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--green);
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: text-shadow 0.2s;
    }

    .slot:hover .slot-name,
    .slot:focus-visible .slot-name,
    .slot.active .slot-name {
      text-shadow: 0 0 8px rgba(15, 172, 62, 0.7);
    }

    .slot-tag {
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-top: 4px;
    }

    .slot.empty {
      cursor: default;
      opacity: 0.35;
      pointer-events: none;
    }

    /* ── Hover Preview Panel ── */
    .detail-panel {
      border: 1px solid var(--border);
      background: var(--bg-slot);
      padding: clamp(24px, 3vh, 40px) clamp(24px, 3vw, 48px);
      min-height: clamp(180px, 20vh, 260px);
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .detail-panel.populated {
      border-color: rgba(15, 172, 62, 0.35);
    }

    .detail-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .detail-panel.populated::before {
      opacity: 1;
    }

    .detail-idle {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: clamp(130px, 15vh, 180px);
      font-size: 12px;
      letter-spacing: 4px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .detail-idle::before {
      content: '▶  ';
    }

    .detail-data {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: clamp(24px, 3vw, 48px);
    }

    .detail-data.visible {
      display: grid;
    }

    @media (max-width: 640px) {
      .detail-data.visible { grid-template-columns: 1fr; }
    }

    .detail-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .detail-title {
      font-size: clamp(20px, 2.2vw, 34px);
      color: var(--green);
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(15, 172, 62, 0.5);
      margin-bottom: 14px;
    }

    .detail-desc {

    const TOTAL_SLOTS = 12;

    // ── Grid ──────────────────────────────────────────────────────────────────

    function renderGrid() {
      const grid = document.getElementById('slotGrid');

      for (let i = 0; i < TOTAL_SLOTS; i++) {
        const p = projects[i] || null;

        const slot = document.createElement('div');
        slot.className = 'slot' + (p ? '' : ' empty');
        if (p) {
          slot.setAttribute('tabindex', '0');
          slot.setAttribute('role', 'button');
          slot.setAttribute('aria-label', p.name);
        }

        const iconContent = p && p.video
          ? `<video src="${p.video}" autoplay loop muted playsinline></video>`
          : (p ? ICONS[p.tag] || ICONS.empty : ICONS.empty);

        slot.innerHTML = `
          <div class="slot-icon">${iconContent}</div>
          <div class="slot-info">
            <div class="slot-name">${p ? p.name : '— Empty —'}</div>
            <div class="slot-tag">${p ? p.tag + ' &middot; ' + p.year : 'No data'}</div>
          </div>`;

        if (p) {
          slot.addEventListener('mouseenter', () => showPreview(i));
          slot.addEventListener('mouseleave', () => slot.classList.remove('active'));
          slot.addEventListener('focus',      () => showPreview(i));
          slot.addEventListener('blur',       () => slot.classList.remove('active'));
          slot.addEventListener('click',      () => openProject(i));
          slot.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') openProject(i);
          });
        }

        grid.appendChild(slot);
      }
    }

    // ── Hover Preview Panel ───────────────────────────────────────────────────

    function showPreview(index) {
      const p = projects[index];
      if (!p) return;

      document.querySelectorAll('.slot').forEach((s, i) => {
        s.classList.toggle('active', i === index);
      });

      const panel = document.getElementById('detailPanel');
      const idle  = document.getElementById('detailIdle');
      const data  = document.getElementById('detailData');

      panel.classList.add('populated');
      idle.style.display = 'none';
      data.classList.add('visible');

      data.innerHTML = `
        <div class="detail-main">
          <div class="detail-label">Project</div>
          <div class="detail-title">${p.name}</div>
          <div class="detail-desc">${p.desc}</div>
          ${p.link ? `<a class="detail-link" href="${p.link}" target="_blank" rel="noopener">View Project &#9654;</a>` : ''}
        </div>
        <div class="meta-col">
          <div>
            <div class="detail-label">Category</div>
            <div class="meta-value">${p.tag}</div>
          </div>
          <div>
            <div class="detail-label">Year</div>
            <div class="meta-value">${p.year}</div>
          </div>
          <div>
            <div class="detail-label">Tools</div>
            <div class="tag-list">${p.tools.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          </div>
        </div>`;
    }

    // ── Full Project Detail ───────────────────────────────────────────────────

    let currentProject      = null;
    let currentProjectIndex = null;

    function getMedia(p) {
      if (p.media) return p.media;
      const items = [];
      if (p.video) items.push({ type: 'video', src: p.video, poster: null });
      while (items.length < 4) items.push({ type: 'image', src: null });
      return items;
    }

    function renderHeroContent(m) {
      if (!m || !m.src) {
        return `<div class="hero-placeholder"><span>NO SIGNAL</span></div>`;
      }
      if (m.type === 'video') {
        return `
          <div class="hero-video-wrap">
            <video class="hero-media" src="${m.src}" autoplay muted playsinline loop></video>
            <button class="hero-play-btn" aria-label="Pause">&#9646;&#9646;</button>
          </div>`;
      }
      return `<img class="hero-media" src="${m.src}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'hero-placeholder',innerHTML:'<span>NO SIGNAL</span>'}))">`;
    }

    function renderThumbContent(m, index) {
      if (!m || !m.src) {
        return `<span class="thumb-num">${String(index + 1).padStart(2, '0')}</span>`;
      }
      if (m.type === 'video') {
        return `<video src="${m.src}" preload="metadata" muted playsinline></video>`;
      }
      return `<img src="${m.src}" alt="">`;
    }

    function renderCaptionContent(m, index, total) {
      const hasCaption = m && m.caption;
      return `
        <div class="caption-index">${String(index + 1).padStart(2, '0')} &nbsp;/&nbsp; ${String(total).padStart(2, '0')}</div>
        ${m && m.captionTitle ? `<div class="caption-title">${m.captionTitle}</div>` : ''}
        ${hasCaption
          ? `<p class="caption-body">${m.caption}</p>`
          : `<div class="caption-empty">No caption</div>`}`;
    }

    function buildDetailHTML(p, index) {
      const media = getMedia(p);
      const prev  = projects[index - 1];
      const next  = projects[index + 1];
      return `
        <div class="detail-inner">
          <div class="detail-page-header">
            <button class="back-btn" id="backBtn">&#9664;&nbsp;&nbsp;EXIT</button>
            <div class="sys-label">System &middot; Memory Card &middot; 8MB</div>
            <div class="header-nav-btns">
              <button class="header-nav-btn" id="prevProjectHeader" ${!prev ? 'disabled' : ''}>&#9664;</button>
              <button class="header-nav-btn" id="nextProjectHeader" ${!next ? 'disabled' : ''}>&#9654;</button>
            </div>
          </div>

          <div class="hero-layout">
            ${prev ? `<button class="project-nav prev" id="prevProject">
              <span class="nav-arrow">&#9664;</span>
              <span class="nav-label">${prev.name}</span>
            </button>` : ''}
            ${next ? `<button class="project-nav next" id="nextProject">
              <span class="nav-arrow">&#9654;</span>
              <span class="nav-label">${next.name}</span>
            </button>` : ''}

            <div class="detail-hero" id="detailHero">
              ${renderHeroContent(media[0])}
            </div>

            <div class="detail-thumbs">
              <div class="thumbs-strip">
                ${media.map((m, i) => `
                  <div class="thumb${i === 0 ? ' active' : ''}" data-index="${i}">
                    ${renderThumbContent(m, i)}
                  </div>`).join('')}
              </div>
            </div>

            <div class="hero-caption" id="heroCaption">
              ${renderCaptionContent(media[0], 0, media.length)}
            </div>
          </div>

          <div class="detail-info-grid">
            <div>
              <div class="detail-label">Project</div>
              <h2 class="detail-project-title">${p.name}</h2>
              <p class="detail-desc">${p.desc}</p>
              ${p.link ? `<a class="detail-link" href="${p.link}" target="_blank" rel="noopener">View Project &#9654;</a>` : ''}
            </div>
            <div class="meta-col">
              <div>
                <div class="detail-label">Category</div>
                <div class="meta-value">${p.tag}</div>
              </div>
              <div>
                <div class="detail-label">Year</div>
                <div class="meta-value">${p.year}</div>
              </div>
              <div>
                <div class="detail-label">Tools</div>
                <div class="tag-list">${p.tools.map(t => `<span class="tag">${t}</span>`).join('')}</div>
              </div>
            </div>
          </div>

          <footer class="detail-footer">
            <div class="footer-text">&copy; 2026 Jake Walkden</div>
            <a class="contact-link" href="mailto:tfvwalkden@gmail.com">tfvwalkden@gmail.com</a>
          </footer>
        </div>`;
    }

    function selectMedia(index) {
      const media    = getMedia(currentProject);
      const hero     = document.getElementById('detailHero');
      const scroller = document.querySelector('.detail-inner');
      const scrollY  = scroller ? scroller.scrollTop : 0;

      hero.style.minHeight = hero.offsetHeight + 'px';

      hero.innerHTML = renderHeroContent(media[index]);
      document.getElementById('heroCaption').innerHTML = renderCaptionContent(media[index], index, media.length);
      document.querySelectorAll('.thumb').forEach((t, i) => {
        t.classList.toggle('active', i === index);
      });

      requestAnimationFrame(() => { if (scroller) scroller.scrollTop = scrollY; });

      // Release height lock once new media has its dimensions
      const release = () => { hero.style.minHeight = ''; };
      const el = hero.querySelector('video, img');
      if (!el) {
        release();
      } else if (el.tagName === 'VIDEO') {
        el.addEventListener('loadedmetadata', release, { once: true });
        setTimeout(release, 800); // fallback
      } else {
        el.complete ? release() : el.addEventListener('load', release, { once: true });
      }
    }


    function wireDetailEvents(overlay, index) {
      overlay.querySelector('#backBtn').addEventListener('click', closeProject);
      overlay.querySelectorAll('.thumb').forEach((thumb, i) => {
        thumb.addEventListener('click', () => selectMedia(i));
      });

      overlay.querySelectorAll('.thumb video').forEach(v => {
        const seek = () => { v.currentTime = 0.01; };
        if (v.readyState >= 1) seek();
        else v.addEventListener('loadedmetadata', seek, { once: true });
      });

      const prevBtn = overlay.querySelector('#prevProject');
      const nextBtn = overlay.querySelector('#nextProject');
      if (prevBtn) prevBtn.addEventListener('click', () => openProject(index - 1, 'prev'));
      if (nextBtn) nextBtn.addEventListener('click', () => openProject(index + 1, 'next'));

      const prevHeaderBtn = overlay.querySelector('#prevProjectHeader');
      const nextHeaderBtn = overlay.querySelector('#nextProjectHeader');
      if (prevHeaderBtn) prevHeaderBtn.addEventListener('click', () => openProject(index - 1, 'prev'));
      if (nextHeaderBtn) nextHeaderBtn.addEventListener('click', () => openProject(index + 1, 'next'));
    }

    function loadProjectContent(overlay, index, enterClass) {
      currentProject      = projects[index];
      currentProjectIndex = index;
      overlay.innerHTML   = buildDetailHTML(currentProject, index);
      overlay.scrollTop   = 0;
      if (enterClass) overlay.querySelector('.detail-inner').classList.add(enterClass);
      wireDetailEvents(overlay, index);
    }

    function openProject(index, direction) {
      const p = projects[index];
      if (!p) return;

      const overlay     = document.getElementById('pageDetail');
      const alreadyOpen = overlay.classList.contains('open');

      if (alreadyOpen && direction) {
        const exitClass  = direction === 'next' ? 'exit-left'   : 'exit-right';
        const enterClass = direction === 'next' ? 'enter-right' : 'enter-left';
        const inner      = overlay.querySelector('.detail-inner');
        if (inner) inner.classList.add(exitClass);
        setTimeout(() => loadProjectContent(overlay, index, enterClass), 200);
        return;
      }

      loadProjectContent(overlay, index, null);

      if (!alreadyOpen) {
        const headerEl    = document.querySelector('header');
        const headerBottom = headerEl ? headerEl.getBoundingClientRect().bottom : 0;
        const isMobile    = window.innerWidth <= 768;

        if (isMobile) {
          overlay.style.top = '0';
          const inner = overlay.querySelector('.detail-inner');
          if (inner) inner.style.paddingTop = headerBottom + 'px';
        } else {
          overlay.style.top = headerBottom + 'px';
        }

        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
      }
    }

    function closeProject() {
      document.getElementById('pageDetail').classList.remove('open');
      setTimeout(() => { document.body.style.overflow = ''; }, 450);
    }

    renderGrid();

    // ── Lightbox ──────────────────────────────────────────────────────────────

    function openLightbox(mediaEl) {
      const lb      = document.getElementById('lightbox');
      const content = document.getElementById('lightboxContent');

      if (mediaEl.tagName === 'VIDEO') {
        const v = document.createElement('video');
        v.src        = mediaEl.src;
        v.muted      = true;
        v.loop       = true;
        v.playsInline = true;
        v.autoplay   = true;
        content.appendChild(v);
      } else {
        content.innerHTML = `<img src="${mediaEl.src}" alt="">`;
      }

      lb.classList.add('open');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      setTimeout(() => {
        document.getElementById('lightboxContent').innerHTML = '';
      }, 350);
    }

    document.getElementById('pageDetail').addEventListener('click', e => {
      const btn = e.target.closest('.hero-play-btn');
      if (btn) {
        const video = btn.closest('.hero-video-wrap')?.querySelector('video');
        if (video) {
          if (video.paused) { video.play();  btn.innerHTML = '&#9646;&#9646;'; }
          else              { video.pause(); btn.innerHTML = '&#9654;'; }
        }
        return;
      }
      const media = e.target.closest('.hero-media');
      if (media) openLightbox(media);
    });

    document.getElementById('lightbox').addEventListener('click', e => {
      if (!e.target.closest('#lightboxContent')) closeLightbox();
    });

    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
